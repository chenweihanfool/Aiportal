services:
  api-server:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8080"
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - default
      # Uncomment and set to whatever network the shared self-hosted Postgres
      # instance lives on, if it's a container on this same Docker host
      # (matches the pf-cwh / tasktracker setup):
      # - shared_postgres

  gis-portal:
    build:
      context: .
      dockerfile: artifacts/gis-portal/Dockerfile
    restart: unless-stopped
    depends_on:
      - api-server
    ports:
      - "${HOST_PORT:-3000}:80"
    networks:
      - default

networks:
  default: {}
  # shared_postgres:
  #   external: true
  #   name: <the actual external network name used by pf-cwh / tasktracker>
