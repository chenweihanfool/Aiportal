kind = "web"
previewPath = "/"
title = "GIS 3D Portal"
version = "1.0.0"
id = "artifacts/gis-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18145

[services.development]
run = "pnpm --filter @workspace/gis-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gis-portal", "run", "build" ]
publicDir = "artifacts/gis-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18145"
BASE_PATH = "/"
